<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lägg till anställd</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/add.css">
</head>
<body>
    <header class="header">
        <nav class="header-nav">
            <ul class="header-list">
                <li><a class="header-link" href="index.html">Startsida</a></li>
                <li><a class="header-link" href="add.html">Lägg till anställd</a></li>
                <li><a class="header-link" href="about.html">Om oss</a></li>
            </ul>
        </nav>
    </header>
    <main class="add-main">
        <h1>Lägg till ny anställd</h1>
        <form id="form" class="add-form">
            <input type="text" id="Name" placeholder="Förnamn">
            <input type="text" id="Lastname" placeholder="Efternamn">
            <input type="text" id="Jobtitle" placeholder="Titel">
            <input type="text" id="Location" placeholder="Plats">
            <input type="date" id="Dateofbirth">
            <button type="submit" class="delete-btn">Spara</button>
        </form>
        <div id="message"></div>
    </main>
    <footer class="footer">
        <ul class="footer-list">
            <li class="footer-list-item">DT207G</li>
            <li class="footer-list-item">Backend-baserad webbutveckling</li>
        </ul>
    </footer>
    <script src="../js/adddata.js"></script>
</body>
</html>
